name: Deploy to Sandbox

# develop -> Screeps "develop" branch (create this branch in Screeps first!)
on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm install

      - name: Build bundle
        run: npm run build

      - name: Push to Screeps (develop branch)
        uses: kskitek/screeps-pusher@v0.1
        with:
          branch: develop
          token: ${{ secrets.SCREEPS_TOKEN }}
          dir: dist/
