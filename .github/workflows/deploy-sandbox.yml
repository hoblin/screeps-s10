name: Deploy to Sandbox

# develop -> Screeps "develop" branch (create this branch in Screeps first!)
on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm install

      - name: Build bundle
        run: npm run build

      - name: Deploy to Screeps (develop branch)
        run: npm run deploy -- --branch develop --dir dist
        env:
          SCREEPS_TOKEN: ${{ secrets.SCREEPS_TOKEN }}
