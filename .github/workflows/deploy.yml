name: Deploy

# master -> Screeps "default" branch (the live world code slot).
# Single branch, single deploy. Living on the edge: push to master = ship to prod.
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm install

      - name: Build bundle
        run: npm run build

      - name: Deploy to Screeps (main / shard2)
        run: npm run deploy
        env:
          SCREEPS_TOKEN: ${{ secrets.SCREEPS_TOKEN }}

      - name: Deploy to Screeps (season)
        run: node deploy.mjs --branch default --server https://screeps.com/season
        env:
          SCREEPS_TOKEN: ${{ secrets.SCREEPS_TOKEN }}
