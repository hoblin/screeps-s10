name: Deploy

# master -> Screeps "default" branch (the live world code slot).
# Single branch, single deploy. Living on the edge: push to master = ship to prod.
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm install

      # Each server gets its OWN bundle — the deploy:* scripts rebuild with that
      # server's expansion map (build --main => shard2 map, build => season map)
      # before uploading, so neither server ever carries the other's remote map.
      - name: Build + deploy to Screeps (main / shard2)
        run: npm run deploy:main
        env:
          SCREEPS_TOKEN: ${{ secrets.SCREEPS_TOKEN }}

      - name: Build + deploy to Screeps (season)
        run: npm run deploy:season
        env:
          SCREEPS_TOKEN: ${{ secrets.SCREEPS_TOKEN }}
